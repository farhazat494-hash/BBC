!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .box {
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      background: white;
      color: #2575fc;
      transition: 0.3s;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Welcome 👋</h1>
    <p>This is my first website</p>
    <button onclick="alert('Hello! 🎉')">Click Me</button>
  </div>
</body>
</html>
